<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>出欠入力 - 部活出欠管理システム</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
    <script src="emergency.js?v=1.0"></script>
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="出欠管理">
    <link rel="apple-touch-icon" href="/icon.svg">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW setup failed: ', err));
            });
        }
    </script>
</head>
<body class="input-page">
    <!-- グローバルナビゲーション -->
    <input type="checkbox" id="nav-toggle" class="nav-toggle">
    <label for="nav-toggle" class="nav-hamburger">
        <span class="bar"></span><span class="bar"></span><span class="bar"></span>
    </label>
    <div class="nav-overlay" onclick="document.getElementById('nav-toggle').checked = false;"></div>
    <nav class="nav-sidebar">
        <div class="nav-header">一般メニュー</div>
        <ul class="nav-links">
            <li><a href="input.html">📝 出欠登録</a></li>
            <li><a href="board.html">👀 状況一覧</a></li>
            <li><a href="schedule.html">🗓️ スケジュール</a></li>
            <li><a href="index.html">🏠 ロック画面へ戻る</a></li>
        </ul>
    </nav>
    <div class="container fade-in">
        <header>
            <h1>出欠登録</h1>
            <p>あなたの名前とパスワードを入力し、現在の状況を選択してください。</p>
        </header>

        <div class="card">
            <div id="alert-box" class="alert hidden"></div>
            
            <form id="attendance-form">
                <div class="form-group">
                    <label for="member-select">名前</label>
                    <select id="member-select" required>
                        <option value="" disabled selected>名前を選択してください</option>
                    </select>
                </div>

                <div class="form-group" style="display: none;">
                    <label for="password-input">パスワード</label>
                    <input type="password" id="password-input" value="">
                </div>

                <div class="form-group">
                    <label for="location-select">現在の場所</label>
                    <select id="location-select" required>
                        <option value="体育館" selected>体育館</option>
                        <option value="部室（加工場）">部室（加工場）</option>
                        <option value="校内">校内</option>
                        <option value="-">（設定なし）</option>
                    </select>
                </div>

                <div class="status-grid form-group">
                    <label>状況を選択</label>
                    <div class="status-buttons">
                        <button type="button" class="status-btn" data-status="出席">出席</button>
                        <button type="button" class="status-btn" data-status="退席">退席</button>
                        <button type="button" class="status-btn" data-status="遅刻">遅刻</button>
                        <button type="button" class="status-btn" data-status="欠席">欠席</button>
                        <button type="button" class="status-btn" data-status="休憩">休憩</button>
                        <button type="button" class="status-btn" data-status="一時外出">一時外出</button>
                    </div>
                    <input type="hidden" id="selected-status" required>
                </div>

                <div class="form-group hidden" id="reason-group" style="display: none;">
                    <label for="reason-input" id="reason-label">理由・詳細 <span style="color:red; font-size:0.85em;">(必須)</span></label>
                    <textarea id="reason-input" rows="2" placeholder="" style="width: 100%; border-radius: 6px; border: 1px solid #D1D5DB; padding: 10px; font-size: 1rem; margin-top: 5px; resize: vertical;"></textarea>
                </div>

                <button type="submit" class="submit-btn" id="submit-btn" disabled>更新する</button>
            </form>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
