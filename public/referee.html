<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>試合タイマー (審判用チャット)</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Noto+Sans+JP:wght@400;500;700;800&family=Share+Tech+Mono&display=swap"
        rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background: #222;
            color: #fff;
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header { background: #333; padding: 10px 10px 10px 50px; text-align: center; font-size: 1.2rem; font-weight: bold; border-bottom: 2px solid #555; }
        
                /* Hamburger Menu */
        .nav-toggle { display: none; }
        .nav-hamburger { position: fixed; top: 15px; left: 15px; z-index: 1000; cursor: pointer; display: flex; flex-direction: column; justify-content: space-between; width: 30px; height: 21px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; box-sizing: content-box; }
        .nav-hamburger:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(0,0,0,0.15); }
        .nav-hamburger .bar { height: 3px; width: 100%; background-color: #fff; border-radius: 3px; transition: all 0.3s ease; }
        .nav-toggle:checked ~ .nav-hamburger .bar:nth-child(1) { transform: translateY(8px) rotate(45deg); }
        .nav-toggle:checked ~ .nav-hamburger .bar:nth-child(2) { opacity: 0; }
        .nav-toggle:checked ~ .nav-hamburger .bar:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }
        .nav-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.4); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); z-index: 998; opacity: 0; visibility: hidden; transition: all 0.3s ease; }
        .nav-toggle:checked ~ .nav-overlay { opacity: 1; visibility: visible; }
        .nav-sidebar { position: fixed; top: 0; right: -280px; width: 280px; height: 100%; background-color: #ffffff; z-index: 999; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: -4px 0 20px rgba(0,0,0,0.1); padding-top: 80px; }
        .nav-toggle:checked ~ .nav-sidebar { right: 0; }
        .nav-header { padding: 0 30px 15px; font-weight: 800; font-size: 1.3rem; border-bottom: 1px solid #e5e7eb; color: #1f2937; margin-bottom: 10px; }
        .nav-links { list-style: none; margin: 0; padding: 0; }
        .nav-links li { margin-bottom: 5px; }
        .nav-links a { display: block; padding: 12px 30px; color: #4b5563; text-decoration: none; font-weight: 500; transition: all 0.2s ease; }
        .nav-links a:hover { background-color: #f3f4f6; color: #4F46E5; padding-left: 35px; }

        .status-board {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px;
            background: #111;
            margin: 10px;
            border-radius: 8px;
        }

        .score {
            font-family: 'Share Tech Mono';
            font-size: 3rem;
            font-weight: bold;
        }

        .score.red {
            color: #ef4444;
        }

        .score.blue {
            color: #3b82f6;
        }

        .timer {
            font-family: 'Share Tech Mono';
            font-size: 3rem;
        }

        .role-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 10px;
        }

        .role-btn {
            padding: 10px 20px;
            font-size: 1.1rem;
            border: none;
            border-radius: 5px;
            background: #444;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .role-btn.active {
            background: #10b981;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #333;
            margin: 10px;
            border-radius: 8px;
            overflow: hidden;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #1a1a1a;
        }

        .preset-area {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            padding: 10px;
            background: #222;
            border-top: 1px solid #444;
        }

        .preset-btn {
            background: #4b5563;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 8px 12px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            flex: 1 1 calc(50% - 5px);
            min-width: 120px;
            font-weight: bold;
        }

        .preset-btn:active {
            background: #6b7280;
            transform: scale(0.95);
        }

        .chat-input-area {
            display: flex;
            padding: 10px;
            gap: 10px;
            background: #222;
            border-top: 1px solid #444;
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px;
            font-size: 1.2rem;
            border-radius: 5px;
            border: none;
        }

        .btn-send {
            background: #3b82f6;
            color: white;
            padding: 10px 20px;
            font-size: 1.1rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .chat-msg {
            padding: 10px;
            border-radius: 8px;
            font-size: 1.2rem;
            max-width: 85%;
        }

        .chat-msg.self {
            background: #065f46;
            align-self: flex-end;
            border-bottom-right-radius: 0;
        }

        .chat-msg.other {
            background: #475569;
            align-self: flex-start;
            border-bottom-left-radius: 0;
        }

        .chat-sender {
            font-weight: bold;
            font-size: 0.9rem;
            color: #ccc;
            display: block;
            margin-bottom: 5px;
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        #overlay h2 {
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <!-- Hamburger Menu -->
    <input type="checkbox" id="nav-toggle" class="nav-toggle">
    <label for="nav-toggle" class="nav-hamburger">
        <span class="bar"></span><span class="bar"></span><span class="bar"></span>
    </label>
    <div class="nav-overlay" onclick="document.getElementById('nav-toggle').checked = false;"></div>
    <nav class="nav-sidebar">
        <div class="nav-header">審判メニュー</div>
        <ul class="nav-links">
            <li><a href="/index.html">ログイン画面に戻る</a></li>
        </ul>
    </nav>

    <div id="overlay">
        <h2>あなたの担当を選択してください</h2>
        <div style="display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;">
            <button class="role-btn" style="background:#b91c1c; font-size: 1.5rem; padding: 20px;"
                onclick="selectRole('赤コート副審')">赤コート副審</button>
            <button class="role-btn" style="background:#eab308; color:#000; font-size: 1.5rem; padding: 20px;"
                onclick="selectRole('主審')">主審</button>
            <button class="role-btn" style="background:#1d4ed8; font-size: 1.5rem; padding: 20px;"
                onclick="selectRole('青コート副審')">青コート副審</button>
        </div>
    </div>

    <div class="header" id="role-display">担当: 未選択</div>

    <div class="status-board" style="flex-direction: column;">
        <div
            style="display: flex; justify-content: space-between; width: 100%; align-items: center; margin-bottom: 10px;">
            <div style="flex: 1; text-align: center; position: relative;">
                <div id="name-left" style="font-size: 0.9rem; color: #aaa; margin-bottom: 5px;">赤チーム</div>
                <div class="score red" style="position: relative; flex-direction: column;">
                    <div id="penalty-left"
                        style="position: absolute; top: 2px; font-size: 1rem; font-family: 'Share Tech Mono'; color: #fff; font-weight: bold; background: transparent; border: 1px solid #facc15; border-radius: 3px; padding: 0 4px; display: none;">
                        15s</div>
                    <span id="score-left">0</span>
                </div>
                <div id="retry-left"
                    style="font-size: 1.2rem; font-weight: bold; background: #eab308; color: white; border: 2px solid #facc15; padding: 2px 10px; border-radius: 5px; margin-top: 5px; display: none;">
                    リトライ</div>
                <div style="margin-top: 5px; display: flex; flex-direction: column; gap: 5px; align-items: center;">
                    <button
                        style="font-size: 0.9rem; padding: 5px; background: #eab308; color: black; border:none; border-radius:3px;"
                        onclick="setRetry('left', 'リトライ')">リトライ</button>
                    <button
                        style="font-size: 0.9rem; padding: 5px; background: #dc2626; color: white; border:none; border-radius:3px;"
                        onclick="setRetry('left', '強制リトライ')">強制リトライ</button>
                    <button
                        style="font-size: 0.9rem; padding: 5px; background: #64748b; color: white; border:none; border-radius:3px;"
                        onclick="clearRetry('left')">解除</button>
                </div>
            </div>

            <div class="timer" id="timer-display" style="flex: 1; text-align: center;">0:00</div>

            <div style="flex: 1; text-align: center; position: relative;">
                <div id="name-right" style="font-size: 0.9rem; color: #aaa; margin-bottom: 5px;">青チーム</div>
                <div class="score blue" style="position: relative; flex-direction: column;">
                    <div id="penalty-right"
                        style="position: absolute; top: 2px; font-size: 1rem; font-family: 'Share Tech Mono'; color: #fff; font-weight: bold; background: transparent; border: 1px solid #facc15; border-radius: 3px; padding: 0 4px; display: none;">
                        15s</div>
                    <span id="score-right">0</span>
                </div>
                <div id="retry-right"
                    style="font-size: 1.2rem; font-weight: bold; background: #eab308; color: white; border: 2px solid #facc15; padding: 2px 10px; border-radius: 5px; margin-top: 5px; display: none;">
                    リトライ</div>
                <div style="margin-top: 5px; display: flex; flex-direction: column; gap: 5px; align-items: center;">
                    <button
                        style="font-size: 0.9rem; padding: 5px; background: #eab308; color: black; border:none; border-radius:3px;"
                        onclick="setRetry('right', 'リトライ')">リトライ</button>
                    <button
                        style="font-size: 0.9rem; padding: 5px; background: #dc2626; color: white; border:none; border-radius:3px;"
                        onclick="setRetry('right', '強制リトライ')">強制リトライ</button>
                    <button
                        style="font-size: 0.9rem; padding: 5px; background: #64748b; color: white; border:none; border-radius:3px;"
                        onclick="clearRetry('right')">解除</button>
                </div>
            </div>
        </div>
    </div>

    <div class="chat-container">
        <div class="chat-messages" id="chat-messages"></div>
        <div class="preset-area" id="preset-area">
            <!-- 定型文ボタンが動的にここに入ります -->
        </div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="連絡事項を手動入力..."
                onkeypress="if(event.key === 'Enter') sendChatMessage()">
            <button class="btn-send" onclick="sendChatMessage()">送信</button>
        </div>
    </div>

    <script src="referee.js"></script>
</body>

</html>
