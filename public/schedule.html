<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スケジュール管理 - 部活出欠管理システム</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="emergency.js?v=1.0"></script>
    <style id="dynamic-calendar-style"></style>
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="出欠管理">
    <link rel="apple-touch-icon" href="/icon.svg">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW setup failed: ', err));
            });
        }
    </script>
</head>
<body class="schedule-page">
    <div class="container fade-in" style="max-width: 1200px; width: 95%; margin: 0 auto;">
        <header style="text-align: center;">
            <h1>スケジュール管理</h1>
        </header>

        <div class="card" style="padding: 20px; margin-bottom: 20px;">
            <div class="card" id="daily-summary-panel" style="display: none; margin-bottom: 20px; background-color: #f8fafc; border-radius: 12px; padding: 15px;">
                <h2 style="font-size: 1.0rem; margin-bottom: 15px; color: #1e293b; border-bottom: 2px solid #e2e8f0; padding-bottom: 8px;"><span id="daily-date-label">選択された日</span> の活動設定</h2>
                <ul style="list-style: none; font-size: 0.95rem; line-height: 2.0; padding: 0;">
                    <li style="display: flex; justify-content: space-between;"><span>活動ルール:</span> <strong id="daily-rule-label" style="color: #4338ca;">-</strong></li>
                </ul>
            </div>
            <div id="calendar" style="min-height: 70vh;"></div>
        </div>

        <div class="links">
            <a href="board.html" class="nav-link">&larr; 状況一覧画面に戻る</a>
            <br>
            <a href="input.html" class="nav-link">入力フォームを開く</a>
        <br><a href="index.html" class="nav-link" style="color: #6B7280; margin-top: 15px; display: inline-block;">🏠 ログイン・起動画面へ戻る</a></div>
    </div>
    
    <script src="schedule.js?v=1.2"></script>
</body>
</html>
