<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タスク状況一覧(その他) - 部活出欠管理システム</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
    <script src="emergency.js?v=1.0"></script>
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="出欠管理">
    <link rel="apple-touch-icon" href="/icon.svg">
    <style>
        .member-card[data-status="実施中"] { border-left-color: #F59E0B; }
        .member-card[data-status="実施中"] .member-status { background-color: #F59E0B; color: white; border:none; }

        .member-card[data-status="完了"] { border-left-color: #10B981; }
        .member-card[data-status="完了"] .member-status { background-color: #10B981; color: white; border:none; }
    </style>
    <script>
        window.currentTeamView = '共通';
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW setup failed: ', err));
            });
        }
    </script>
</head>
<body class="board-page" style="display: flex; justify-content: center; padding: 40px 20px;">
    <input type="checkbox" id="nav-toggle" class="nav-toggle">
    <label for="nav-toggle" class="nav-hamburger">
        <span class="bar"></span><span class="bar"></span><span class="bar"></span>
    </label>
    <div class="nav-overlay" onclick="document.getElementById('nav-toggle').checked = false;"></div>
    <nav class="nav-sidebar">
        <div class="nav-header">一般メニュー</div>
        <ul class="nav-links">
            <li><a href="input.html">出欠登録</a></li>
            <li><a href="board.html">状況一覧</a></li>
            <li><a href="schedule.html">スケジュール</a></li>
            <li><a href="future.html">事前連絡一覧</a></li>
            <li><a href="tasks.html">タスク管理</a></li>
            <li><a href="task-board.html">タスク状況一覧</a></li>
            <li><a href="index.html">ホーム画面</a></li>
        </ul>
    </nav>
    <div class="container fade-in" style="width: 100%; max-width: 1200px;">
        <header class="board-header">
            <div class="header-left">
                <h1>タスク状況一覧 <span style="font-size:0.6em; color:#666;">(その他)</span></h1>
            </div>
            <div class="header-right">
                <div id="clock" class="clock"></div>
            </div>
        </header>

        <div class="team-tabs" style="display: flex; gap: 10px; margin-bottom: 20px;">
            <a href="task-board.html" class="tab-btn " style="flex:1; text-align:center; padding:10px; background:#E5E7EB; color:#374151; border-radius:8px; font-weight:bold; text-decoration:none;">部全体</a>
            <a href="task-board-a.html" class="tab-btn " style="flex:1; text-align:center; padding:10px; background:#E5E7EB; color:#374151; border-radius:8px; font-weight:bold; text-decoration:none;">Aチーム</a>
            <a href="task-board-b.html" class="tab-btn " style="flex:1; text-align:center; padding:10px; background:#E5E7EB; color:#374151; border-radius:8px; font-weight:bold; text-decoration:none;">Bチーム</a>
            <a href="task-board-other.html" class="tab-btn active" style="flex:1; text-align:center; padding:10px; background:#4F46E5; color:white; border-radius:8px; font-weight:bold; text-decoration:none;">その他</a>
        </div>

        <div class="card">
            <div id="members-grid" class="members-grid">
                <div style="text-align:center; color:#6b7280; grid-column: 1 / -1; padding: 30px;">データを読み込み中...</div>
            </div>
        </div>
    </div>
    
    <script src="task-board.js?v=1.0"></script>
</body>
</html>
