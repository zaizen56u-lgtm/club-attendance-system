<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>試合タイマー (管理者設定専用)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Noto+Sans+JP:wght@400;500;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ログインオーバーレイ -->
    <div id="login-overlay" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #1a1a1a; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999;">
        <h2 style="color: #ccc; margin-bottom: 20px;">🔒 管理者設定ログイン</h2>
        <input type="password" id="admin-pw" class="admin-input" style="width: 250px; text-align: center; margin-bottom: 10px;" placeholder="パスワードを入力">
        <button class="btn btn-play" style="width: 250px;" onclick="checkAdminPassword()">ログイン</button>
    </div>

    <div class="app-container" style="max-width: 800px; display: none;" id="admin-main-content">
        <h2 style="text-align: center; color: #aaa;">試合管理者パネル (設定専用)</h2>
        
        <div class="control-panel">
            <div class="control-group">
                <h3>試合全体の設定</h3>
                <div style="display: flex; gap: 20px; margin-bottom: 20px; margin-top: 10px;">
                    <button class="btn btn-setting" style="flex: 1;" onclick="setTargetTime()">終了時間（自動停止）の設定</button>
                    <button class="btn btn-setting" style="flex: 1;" onclick="sendAction('RESET')">タイマー強制リセット (0:00)</button>
                    <button class="btn" style="flex: 1; background-color: #7f1d1d; color: white;" onclick="if(confirm('タイマーと得点をすべてリセットして新しい試合を始めますか？')) sendAction('RESET_MATCH')">試合を初期化 (全リセット)</button>
                </div>
                
                <h3 style="margin-top: 30px;">チームの割り当て</h3>
                <div style="display: flex; gap: 20px; margin-top: 10px;">
                    <div style="flex: 1;">
                        <label style="display: block; margin-bottom: 5px; color: #ef4444; font-weight: bold;">左チーム (赤)</label>
                        <select id="input-name-left" class="admin-input" onchange="sendName('SET_NAME_LEFT', this.value)"></select>
                    </div>
                    <div style="flex: 1;">
                        <label style="display: block; margin-bottom: 5px; color: #3b82f6; font-weight: bold;">右チーム (青)</label>
                        <select id="input-name-right" class="admin-input" onchange="sendName('SET_NAME_RIGHT', this.value)"></select>
                    </div>
                </div>
            </div>

            <!-- 得点項目と配分の設定パネル -->
            <div class="control-group" style="margin-top: 20px;">
                <h3>得点項目と配分の設定</h3>
                
                <h4 style="margin-top: 15px; color: #eee; font-size: 1.1rem; border-bottom: 1px solid #444; padding-bottom: 5px; display: flex; justify-content: space-between; align-items: center;">
                    通常得点 (何回でも加算可能)
                    <button class="btn btn-play" style="font-size: 0.8rem; padding: 5px 10px;" onclick="addNormalScore()">+ 追加</button>
                </h4>
                <div id="normal-scores-container" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; margin-bottom: 20px;">
                    <!-- 動的に生成 -->
                </div>

                <h4 style="margin-top: 15px; color: #eee; font-size: 1.1rem; border-bottom: 1px solid #444; padding-bottom: 5px; display: flex; justify-content: space-between; align-items: center;">
                    特殊条件得点 (回数上限あり)
                    <button class="btn btn-play" style="font-size: 0.8rem; padding: 5px 10px;" onclick="addSpecialScore()">+ 追加</button>
                </h4>
                <div id="special-scores-container" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; margin-bottom: 20px;">
                    <!-- 動的に生成 -->
                </div>

                <button class="btn btn-setting" style="width: 100%; margin-top: 15px;" onclick="updateRules()">項目名と得点配分を保存・再計算</button>
            </div>

            <!-- 連絡・チャット定型文の設定パネル -->
            <div class="control-group" style="margin-top: 20px;">
                <h3>連絡チャットの定型文設定</h3>
                <div>
                    <p style="font-size: 0.9rem; color: #aaa; margin-bottom: 10px;">審判や運営が連絡ですぐに送れる定型文を改行で入力してください。</p>
                    <textarea id="preset-list-textarea" class="admin-input" style="height: 120px; font-size: 1rem;"></textarea>
                    <button class="btn btn-setting" style="width: 100%; margin-top: 10px;" onclick="updatePresetList()">定型文を保存</button>
                </div>
            </div>

            <!-- チームリスト設定パネル -->
            <div class="control-group" style="margin-top: 20px;">
                <h3>チームリストの設定</h3>
                <div>
                    <p style="font-size: 0.9rem; color: #aaa; margin-bottom: 10px;">ドロップダウンで選択できるチーム名を改行で入力してください。</p>
                    <textarea id="team-list-textarea" class="admin-input" style="height: 150px; font-size: 1rem;"></textarea>
                    <button class="btn btn-setting" style="width: 100%;" onclick="updateTeamList()">チームリストを保存</button>
                </div>
            </div>
        </div>
    </div>
    <script src="admin.js"></script>
</body>
</html>
