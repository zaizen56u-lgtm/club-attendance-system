<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bチーム スケジュール管理 - 部活出欠管理システム</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="emergency.js?v=1.0"></script>
    <style id="dynamic-calendar-style"></style>
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="出欠管理">
    <link rel="apple-touch-icon" href="/icon.svg">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW setup failed: ', err));
            });
        }
    </script>
</head>
<body class="schedule-page">
    <!-- グローバルナビゲーション -->
    <input type="checkbox" id="nav-toggle" class="nav-toggle">
    <label for="nav-toggle" class="nav-hamburger">
        <span class="bar"></span><span class="bar"></span><span class="bar"></span>
    </label>
    <div class="nav-overlay" onclick="document.getElementById('nav-toggle').checked = false;"></div>
    <nav class="nav-sidebar">
        <div class="nav-header">一般メニュー</div>
        <ul class="nav-links">
            <li><a href="input.html">出欠登録</a></li>
            <li><a href="board.html">状況一覧</a></li>
            <li><a href="schedule.html">スケジュール</a></li>
            <li><a href="future.html">事前連絡一覧</a></li>
            <li><a href="tasks.html">タスク管理</a></li>
            <li><a href="task-board.html">タスク状況一覧</a></li>
            <li><a href="index.html">ホーム画面</a></li>
        </ul>
    </nav>
    <div class="container fade-in" style="max-width: 1200px; width: 95%; margin: 0 auto; padding-top: 20px;">
        <header style="text-align: center;">
            <h1>スケジュール管理 (Bチーム)</h1>
        </header>

        <div class="card" style="padding: 20px; margin-bottom: 20px;">
            <div class="card" id="daily-summary-panel" style="display: none; margin-bottom: 20px; background-color: #f8fafc; border-radius: 12px; padding: 15px;">
                <h2 style="font-size: 1.0rem; margin-bottom: 15px; color: #1e293b; border-bottom: 2px solid #e2e8f0; padding-bottom: 8px;"><span id="daily-date-label">選択された日</span> の活動設定</h2>
                <ul style="list-style: none; font-size: 0.95rem; line-height: 2.0; padding: 0;">
                    <li style="display: flex; justify-content: space-between;"><span>活動ルール:</span> <strong id="daily-rule-label" style="color: #4338ca;">-</strong></li>
                </ul>
            </div>
            <div class="team-tabs" style="display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; flex-wrap: wrap;">
                <a href="schedule.html" class="team-tab-btn" style="padding: 10px 24px; border: 2px solid #3B82F6; background: white; color: #3B82F6; border-radius: 8px; font-weight: bold; cursor: pointer; text-decoration: none; transition: all 0.2s;">部全体 (共通)</a>
                <a href="schedule-a.html" class="team-tab-btn" style="padding: 10px 24px; border: 2px solid #EF4444; background: white; color: #EF4444; border-radius: 8px; font-weight: bold; cursor: pointer; text-decoration: none; transition: all 0.2s;">Aチーム</a>
                <a href="schedule-b.html" class="team-tab-btn active" style="padding: 10px 24px; border: 2px solid #10B981; background: #10B981; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; text-decoration: none; transition: all 0.2s;">Bチーム</a>
            </div>
            
            <script>window.currentTeamView = 'B';</script>
            <div id="calendar" style="min-height: 70vh;"></div>
        </div>

    </div>
    
    <script src="schedule.js?v=1.2"></script>
</body>
</html>
