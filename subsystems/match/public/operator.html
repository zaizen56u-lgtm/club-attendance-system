<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>試合タイマー (運用専用)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Noto+Sans+JP:wght@400;500;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background: #222; color: #fff; font-family: 'Inter', 'Noto Sans JP', sans-serif; }
        .op-container { display: flex; flex-direction: column; height: 100vh; padding: 10px; gap: 10px; }
        .op-top-row { display: flex; height: 25vh; gap: 10px; }
        .op-score-box { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 15vh; font-family: 'Share Tech Mono'; border-radius: 10px; text-shadow: 2px 2px 5px rgba(0,0,0,0.5); transition: background-color 0.3s, color 0.3s; }
        .op-red { background: #ef4444; border: 4px solid #b91c1c; }
        .op-blue { background: #3b82f6; border: 4px solid #1d4ed8; }
        
        .op-score-box.winner { background-color: #facc15; color: #000; text-shadow: none; }
        .op-red.winner { box-shadow: inset 0 0 0 20px #ef4444; }
        .op-blue.winner { box-shadow: inset 0 0 0 20px #3b82f6; }
        .op-center-logo { width: 25%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #eee; color: #111; border-radius: 10px; }
        .op-mid-row { height: 12vh; display: flex; align-items: center; justify-content: center; background: #444; border-radius: 10px; gap: 30px; }
        .op-bot-row { flex: 1; background: #333; border-radius: 10px; padding: 10px; overflow-y: auto; }
        
        .op-timer { font-size: 8vh; font-family: 'Share Tech Mono'; width: 250px; text-align: center; }
        .btn-op { font-size: 1.5rem; padding: 10px 25px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        .btn-play { background: #22c55e; color: white; }
        .btn-pause { background: #ef4444; color: white; }
        .btn-reset { background: #64748b; color: white; }
        .btn-judge { background: #eab308; color: black; }

        .op-team-select { width: 95%; padding: 8px; font-size: 1.2rem; border-radius: 5px; border: 1px solid #aaa; background: rgba(255,255,255,0.9); font-weight: bold; color: #333; }

        .breakdown-table { width: 100%; border-collapse: collapse; font-size: 1.4rem; }
        .breakdown-table th { border-bottom: 2px solid #555; padding: 10px; }
        .breakdown-table td { padding: 12px 5px; text-align: center; border-bottom: 1px solid #444; }
        .col-red { width: 35%; background: rgba(239, 68, 68, 0.15); }
        .col-item { width: 30%; font-weight: bold; }
        .col-blue { width: 35%; background: rgba(59, 130, 246, 0.15); }
        
        .bd-controls { display: flex; align-items: center; justify-content: center; gap: 15px; }
        .bd-btn { width: 50px; height: 50px; font-size: 2rem; border: none; border-radius: 8px; cursor: pointer; background: #555; color: #fff; }
        .bd-btn:active { background: #777; }
        .bd-val { width: 50px; font-family: 'Share Tech Mono'; font-size: 2.2rem; }
        
        .checkbox-large { transform: scale(2); margin-right: 10px; cursor: pointer; }

        .chat-container { margin-top: 20px; background: #222; border-radius: 8px; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .chat-messages { height: 200px; overflow-y: auto; background: #111; padding: 10px; border-radius: 5px; display: flex; flex-direction: column; gap: 5px; }
        .chat-input-area { display: flex; gap: 10px; }
        .chat-input-area input { flex: 1; padding: 10px; font-size: 1.2rem; border-radius: 5px; border: none; }
        .btn-chat { background: #3b82f6; color: white; padding: 10px 20px; }
        .chat-msg { padding: 8px; border-radius: 5px; font-size: 1.1rem; max-width: 80%; }
        .chat-msg.self { background: #065f46; align-self: flex-end; border-bottom-right-radius: 0; }
        .chat-msg.other { background: #475569; align-self: flex-start; border-bottom-left-radius: 0; }
        .chat-sender { font-weight: bold; font-size: 0.9rem; color: #ccc; display: block; margin-bottom: 3px; }
        .preset-area { display: flex; flex-wrap: wrap; gap: 5px; padding: 10px; background: #2a2a2a; border-top: 1px solid #444; }
        .preset-btn { background: #4b5563; color: white; border: none; border-radius: 4px; padding: 8px 12px; font-size: 1rem; cursor: pointer; transition: 0.2s; flex: 1 1 calc(50% - 5px); min-width: 120px; font-weight: bold; }
        .preset-btn:active { background: #6b7280; transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="op-container">
        <!-- Top Row: Scores -->
        <div class="op-top-row">
            <div class="op-score-box op-red" id="op-box-left" style="position: relative;">
                <div id="op-penalty-left" style="position: absolute; top: 10px; font-size: 2rem; font-family: 'Share Tech Mono'; color: #fff; font-weight: bold; background: transparent; border: 3px solid #facc15; border-radius: 8px; padding: 2px 10px; display: none;">15s</div>
                <div id="op-score-left">0</div>
            </div>
            <div class="op-center-logo">
                <!-- ロゴ画像が指定された際はこちらの src を変更します -->
                <img src="logo.png" alt="ROBOCON" style="max-width: 90%; max-height: 80%; object-fit: contain;" id="op-logo">
            </div>
            <div class="op-score-box op-blue" id="op-box-right" style="position: relative;">
                <div id="op-penalty-right" style="position: absolute; top: 10px; font-size: 2rem; font-family: 'Share Tech Mono'; color: #fff; font-weight: bold; background: transparent; border: 3px solid #facc15; border-radius: 8px; padding: 2px 10px; display: none;">15s</div>
                <div id="op-score-right">0</div>
            </div>
        </div>

        <!-- Middle Row: Timer Controls -->
        <div class="op-mid-row">
            <button class="btn-op btn-play" onclick="handleStartClick()">スタート (3秒前)</button>
            <button class="btn-op btn-pause" onclick="sendAction('PAUSE')">停止</button>
            <div class="op-timer" id="op-timer-display">0:00</div>
            <button class="btn-op btn-reset" onclick="sendAction('RESET')">リセット</button>
            <div style="border-left: 2px solid #666; height: 60%; margin: 0 10px;"></div>
            <button class="btn-op btn-judge" onclick="sendAction('JUDGE')">勝者判定</button>
            <button class="btn-op btn-reset" style="background:#888;" onclick="sendAction('CLEAR_JUDGE')">解除</button>
        </div>

        <!-- Bottom Row: Breakdown Table -->
        <div class="op-bot-row">
            <table class="breakdown-table">
                <thead>
                    <tr>
                        <th class="col-red" style="position: relative;">
                            <select id="input-name-left" class="op-team-select" onchange="sendName('SET_NAME_LEFT', this.value)"></select>
                            <div id="retry-left" style="font-size: 1.5rem; font-weight: bold; background: #eab308; color: white; border: 3px solid #facc15; padding: 5px; border-radius: 8px; margin-top: 10px; display: none;">リトライ</div>
                            <div style="margin-top: 10px; display: flex; gap: 5px; justify-content: center;">
                                <button class="btn-op" style="font-size: 1rem; padding: 5px; background: #eab308; color: black;" onclick="setRetry('left', 'リトライ')">リトライ</button>
                                <button class="btn-op" style="font-size: 1rem; padding: 5px; background: #dc2626; color: white;" onclick="setRetry('left', '強制リトライ')">強制リトライ</button>
                                <button class="btn-op" style="font-size: 1rem; padding: 5px; background: #64748b; color: white;" onclick="clearRetry('left')">解除</button>
                            </div>
                        </th>
                        <th class="col-item">得点項目</th>
                        <th class="col-blue" style="position: relative;">
                            <select id="input-name-right" class="op-team-select" onchange="sendName('SET_NAME_RIGHT', this.value)"></select>
                            <div id="retry-right" style="font-size: 1.5rem; font-weight: bold; background: #eab308; color: white; border: 3px solid #facc15; padding: 5px; border-radius: 8px; margin-top: 10px; display: none;">リトライ</div>
                            <div style="margin-top: 10px; display: flex; gap: 5px; justify-content: center;">
                                <button class="btn-op" style="font-size: 1rem; padding: 5px; background: #eab308; color: black;" onclick="setRetry('right', 'リトライ')">リトライ</button>
                                <button class="btn-op" style="font-size: 1rem; padding: 5px; background: #dc2626; color: white;" onclick="setRetry('right', '強制リトライ')">強制リトライ</button>
                                <button class="btn-op" style="font-size: 1rem; padding: 5px; background: #64748b; color: white;" onclick="clearRetry('right')">解除</button>
                            </div>
                        </th>
                    </tr>
                </thead>
                <tbody id="normal-scores-tbody">
                    <!-- カテゴリー1: 通常得点 -->
                    <tr>
                        <td colspan="3" style="text-align: center; background: #444; font-size: 1.1rem; padding: 5px; font-weight: bold; border-bottom: 2px solid #555;">通常得点 (何回でも加算可能)</td>
                    </tr>
                </tbody>
                <tbody id="special-scores-tbody">
                    <!-- カテゴリー2: 特殊条件得点 -->
                    <tr>
                        <td colspan="3" style="text-align: center; background: #444; font-size: 1.1rem; padding: 5px; font-weight: bold; border-bottom: 2px solid #555;">特殊条件得点 (回数上限あり)</td>
                    </tr>
                </tbody>
            </table>
            <div style="text-align:center; margin-top: 20px; display: flex; justify-content: center; gap: 20px;">
                <button class="btn-op btn-reset" style="background-color: #ef4444;" onclick="if(confirm('両チームの得点内訳のみを0にリセットしますか？')) sendAction('RESET_SCORE')">得点のみリセット</button>
                <button class="btn-op btn-reset" style="background-color: #7f1d1d;" onclick="if(confirm('タイマーと得点内訳をすべてリセットして新しい試合を始めますか？')) sendAction('RESET_MATCH')">試合を完全に初期化 (全リセット)</button>
            </div>
            <div style="text-align:center; margin-top: 20px;">
                <button class="btn-op" style="background-color: #10b981; color: white; width: 50%; font-weight: bold;" onclick="saveMatchResults()">試合結果を保存する (Excel)</button>
            </div>
            
            <div class="chat-container">
                <h3 style="margin:0; font-size:1.2rem;">運営・審判間連絡チャット (あなたのロール: タイマー運営)</h3>
                <div class="chat-messages" id="chat-messages"></div>
                <div class="preset-area" id="preset-area"></div>
                <div class="chat-input-area">
                    <input type="text" id="chat-input" placeholder="メッセージを手動入力..." onkeypress="if(event.key === 'Enter') sendChatMessage()">
                    <button class="btn-op btn-chat" onclick="sendChatMessage()">送信</button>
                </div>
            </div>
        </div>
    </div>
    <script src="operator.js"></script>
</body>
</html>
