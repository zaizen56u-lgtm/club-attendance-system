<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>試合タイマー (表示用)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Noto+Sans+JP:wght@400;500;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="unlock-audio-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; display: flex; justify-content: center; align-items: center; cursor: pointer; backdrop-filter: blur(5px);">
        <div style="text-align: center; color: white; font-family: 'Noto Sans JP', sans-serif;">
            <div style="font-size: 6rem; margin-bottom: 10px;">🔊</div>
            <h1 style="font-size: 4rem; margin: 0;">画面をクリックして開始</h1>
            <p style="font-size: 1.5rem; margin-top: 20px; opacity: 0.8;">※音声を有効化するために必ずクリックしてください</p>
        </div>
    </div>
    <!-- 表示専用ボード（操作パネルなし） -->
    <div class="app-container" style="max-width: 98%; width: 100%;">
        <div class="scoreboard" style="height: 95vh; display: flex; flex-direction: column;">
            <div class="timer-section" style="flex: 1.6; position: relative; padding: 0;">
                <div class="timer-display" id="main-timer" style="font-size: 45vh; margin-top: 1vh; letter-spacing: 2vw;">0:00</div>
            </div>
            <div class="teams-section" style="flex: 1.4; height: auto;">
                <div class="team-box team-left" id="box-left" style="position: relative; padding: 1vh 2vw; display: flex; flex-direction: column; justify-content: center; align-items: center;">
                    <div id="penalty-left" style="font-size: 5vh; font-family: 'Share Tech Mono'; color: #fff; font-weight: bold; background: transparent; border: 5px solid #facc15; border-radius: 12px; padding: 0.5vh 2vw; margin-bottom: 0.5vh; display: none;">15s</div>
                    <div class="score-display" id="score-left" style="font-size: 20vh; margin-bottom: 0;">0</div>
                    <div class="team-name display-only" id="name-left" style="font-size: 12vh; margin-top: 0.5vh; font-weight: 800;">チームA</div>
                    <div id="retry-left" style="font-size: 5vh; font-weight: bold; background: #eab308; color: white; border: 4px solid #facc15; padding: 0.5vh 2vw; border-radius: 10px; margin-top: 0.5vh; display: none; text-align: center;">リトライ</div>
                </div>
                <div class="team-box team-right" id="box-right" style="position: relative; padding: 1vh 2vw; display: flex; flex-direction: column; justify-content: center; align-items: center;">
                    <div id="penalty-right" style="font-size: 5vh; font-family: 'Share Tech Mono'; color: #fff; font-weight: bold; background: transparent; border: 5px solid #facc15; border-radius: 12px; padding: 0.5vh 2vw; margin-bottom: 0.5vh; display: none;">15s</div>
                    <div class="score-display" id="score-right" style="font-size: 20vh; margin-bottom: 0;">0</div>
                    <div class="team-name display-only" id="name-right" style="font-size: 12vh; margin-top: 0.5vh; font-weight: 800;">チームB</div>
                    <div id="retry-right" style="font-size: 5vh; font-weight: bold; background: #eab308; color: white; border: 4px solid #facc15; padding: 0.5vh 2vw; border-radius: 10px; margin-top: 0.5vh; display: none; text-align: center;">リトライ</div>
                </div>
            </div>
        </div>
    </div>
    <script src="board.js"></script>
</body>
</html>
