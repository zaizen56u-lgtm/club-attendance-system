<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在庫・備品管理システム</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- サイドバー -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>📦 備品管理</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active">ダッシュボード</a>
                <a href="#" class="nav-item">備品一覧</a>
                <a href="#" class="nav-item">貸出・返却記録</a>
                <a href="#" class="nav-item">設定</a>
            </nav>
        </aside>

        <!-- メインコンテンツ -->
        <main class="main-content">
            <header class="topbar">
                <h1>ダッシュボード</h1>
                <button class="btn-primary">+ 新規備品登録</button>
            </header>

            <div class="dashboard-cards">
                <div class="card">
                    <h3>総備品数</h3>
                    <p class="card-value">124 <span class="unit">個</span></p>
                </div>
                <div class="card">
                    <h3>貸出中</h3>
                    <p class="card-value text-warning">15 <span class="unit">個</span></p>
                </div>
                <div class="card">
                    <h3>在庫わずか</h3>
                    <p class="card-value text-danger">3 <span class="unit">種類</span></p>
                </div>
            </div>

            <section class="recent-activity">
                <h2>最近の貸出・返却</h2>
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>日時</th>
                                <th>備品名</th>
                                <th>利用者</th>
                                <th>ステータス</th>
                            </tr>
                        </thead>
                        <tbody id="activity-log">
                            <!-- JSで動的に追加されます -->
                            <tr>
                                <td>2026/04/26 14:30</td>
                                <td>デジタルカメラ (A-01)</td>
                                <td>山田 太郎</td>
                                <td><span class="badge badge-warning">貸出中</span></td>
                            </tr>
                            <tr>
                                <td>2026/04/26 10:15</td>
                                <td>プロジェクター (P-02)</td>
                                <td>鈴木 花子</td>
                                <td><span class="badge badge-success">返却済</span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
